<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>niniblendz | Book with Nihal</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}
h1 { font-size: 50px; margin-bottom: 10px; }
p { font-size: 18px; color: #ccc; }
button {
  margin-top: 20px;
  padding: 15px 40px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: gold;
  color: black;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}
button:hover { background: orange; transform: scale(1.05); }
.card {
  background: #222;
  padding: 30px;
  border-radius: 15px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
}
label { display: block; margin: 15px 0 5px; font-size: 16px; }
input, select { padding: 10px; font-size: 16px; border-radius: 6px; border: none; width: 80%; max-width: 300px; }
</style>
</head>
<body>

<h1>niniblendz 💈</h1>
<p>Sharp $10 Cuts by Nihal</p>

<div class="card">
  <h2>Book Your Haircut</h2>
  <p>Available: Monday – Friday, 10:40 AM – 12:00 PM</p>

  <label for="date">Pick a Date:</label>
  <input type="date" id="date" required>

  <label for="time">Pick a Time:</label>
  <select id="time">
    <option value="10:40 AM">10:40 AM</option>
    <option value="11:00 AM">11:00 AM</option>
    <option value="11:20 AM">11:20 AM</option>
    <option value="11:40 AM">11:40 AM</option>
  </select>

  <label for="barber">Barber:</label>
  <select id="barber">
    <option value="Nihal">Nihal</option>
  </select>

  <br>
  <button onclick="sendSMS()">Book Now via SMS</button>
</div>

<footer style="margin-top:40px;">
  © 2026 niniblendz | Owned by Nihal
</footer>

<script>
function sendSMS() {
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;
  const barber = document.getElementById('barber').value;

  if (!date) {
    alert("Please select a date!");
    return;
  }

  const message = `Hi Nihal, I would like to book a haircut with ${barber} on ${date} at ${time}.`;

  const encodedMessage = encodeURIComponent(message);
  const phoneNumber = "+16474869758"; // your updated number

  window.location.href = `sms:${phoneNumber}?body=${encodedMessage}`;
}
</script>

</body>
</html>
