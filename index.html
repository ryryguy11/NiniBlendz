<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>niniblendz | Book with Nihal</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: rgba(20,20,20,0.95);
  padding: 40px;
  border-radius: 20px;
  width: 95%;
  max-width: 500px;
  box-shadow: 0 0 40px rgba(255, 215, 0, 0.15);
  text-align: center;
  border: 1px solid rgba(255,215,0,0.2);
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  letter-spacing: 2px;
  margin-bottom: 5px;
}

.tagline {
  font-size: 16px;
  color: #bbb;
  margin-bottom: 30px;
}

.price {
  font-size: 28px;
  color: gold;
  margin-bottom: 10px;
  font-weight: 600;
}

.availability {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 30px;
}

label {
  display: block;
  margin: 15px 0 5px;
  text-align: left;
  font-size: 14px;
  color: #ccc;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #2a2a2a;
  color: white;
  font-size: 14px;
}

input:focus, select:focus {
  outline: 1px solid gold;
}

button {
  margin-top: 25px;
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: gold;
  color: black;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: orange;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(255,165,0,0.3);
}

.footer {
  margin-top: 25px;
  font-size: 12px;
  color: #777;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">niniblendz 💈</div>
  <div class="tagline">Sharp $10 Cuts by Nihal</div>

  <div class="price">$10 Haircut</div>
  <div class="availability">Monday – Friday | 10:40 AM – 12:00 PM</div>

  <label for="date">Select Date</label>
  <input type="date" id="date">

  <label for="time">Select Time</label>
  <select id="time">
    <option value="10:40 AM">10:40 AM</option>
    <option value="11:00 AM">11:00 AM</option>
    <option value="11:20 AM">11:20 AM</option>
    <option value="11:40 AM">11:40 AM</option>
  </select>

  <label for="barber">Select Barber</label>
  <select id="barber">
    <option value="Nihal">Nihal</option>
  </select>

  <button onclick="sendSMS()">Book Appointment</button>

  <div class="footer">
    © 2026 niniblendz | Owned by Nihal
  </div>

</div>

<script>
function sendSMS() {
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;
  const barber = document.getElementById('barber').value;

  if (!date) {
    alert("Please select a date!");
    return;
  }

  const message = `Hi Nihal, I would like to book a haircut with ${barber} on ${date} at ${time}.`;
  const encodedMessage = encodeURIComponent(message);
  const phoneNumber = "+16474869758";

  window.location.href = `sms:${phoneNumber}?body=${encodedMessage}`;
}
</script>

</body>
</html>
